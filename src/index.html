<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlareGuard — Adaptive Video Dimming</title>
  <link rel="stylesheet" href="./ui/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body>
  <header class="site-header">
    <h1 class="logo">GlareGuard</h1>
    <p class="tagline">Easy on the eyes.</p>
  </header>

  <main>
    <section class="hero">
      <form id="url-form" class="url-form">
        <input
          type="text"
          id="url-input"
          class="url-input"
          placeholder="Paste a YouTube URL..."
          autocomplete="off"
          autofocus
        >
        <button type="submit" class="url-submit">Watch</button>
      </form>
    </section>

    <section id="player-section" class="player-section hidden">
      <div id="player-wrapper" class="player-wrapper">
        <div id="player"></div>
        <div id="filter-overlay" class="filter-overlay"></div>
      </div>
      <div id="settings-container" class="settings-container"></div>
    </section>
  </main>

  <button class="install-btn" id="install-btn">Install App</button>

  <footer class="site-footer">
    <p>&copy; 2026 GlareGuard</p>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
